# Deploy to Railway + Vercel after CI passes on master.
#
# Configure a GitHub Environment named "prod" (Settings → Environments)
# and add these secrets there (repository secrets also work as fallback):
#
# Deploy tokens (required):
#   RAILWAY_TOKEN  — Project token for the production environment (Railway project
#                    → Settings → Tokens). Do NOT use an account token here and
#                    do NOT run `railway link` with a project token.
#   VERCEL_TOKEN   — https://vercel.com/account/tokens
#
# Backend API keys (synced to Railway on each backend deploy):
#   OPENROUTER_API_KEY, GIT_TOKEN, NVD_API_KEY, ABUSEIPDB_API_KEY
#   Note: name the GitHub secret GIT_TOKEN (not GITHUB_TOKEN — that name is
#   reserved for the automatic Actions CI token).
#
# Frontend API keys (synced to Vercel production on each frontend deploy):
#   GHL_API_TOKEN, GHL_LOCATION_ID, RESEND_API_KEY, REPORT_FROM_EMAIL,
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN
#
# Optional repository variables (Settings → Variables):
#   RAILWAY_PROJECT_ID, RAILWAY_SERVICE_ID, VERCEL_ORG_ID, VERCEL_PROJECT_ID,
#   NEXT_PUBLIC_API_URL

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: true

env:
  RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID || '224ad38c-41fc-40c3-9da8-afe1dac9a668' }}
  RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID || 'securetotalscan-api' }}
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || 'team_x0HywmHRlyGlzeUAlcsAIsYY' }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || 'prj_LzgIUHdMQXzfOfy1icfyrNHkdK3v' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://securetotalscan-api-production.up.railway.app' }}

jobs:
  changes:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.targets.outputs.backend }}
      frontend: ${{ steps.targets.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect deploy targets
        id: targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          echo "$files"

          backend=false
          frontend=false

          # CD workflow or sync script changes → redeploy both + refresh env secrets
          if echo "$files" | grep -qE '^\.github/workflows/cd\.yml$|^scripts/sync-(railway|vercel)-env\.sh$'; then
            backend=true
            frontend=true
          fi

          if echo "$files" | grep -qE '^backend/'; then
            backend=true
          fi

          if echo "$files" | grep -qE '^(app/|components/|lib/|public/|package\.json|package-lock\.json|next\.config|tailwind\.config|postcss\.config|tsconfig|middleware\.|eslint\.config|vercel\.json|scripts/vercel-ignore\.sh)'; then
            frontend=true
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "Deploy backend=$backend frontend=$frontend"

  deploy-backend:
    name: Railway
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Sync API keys to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Missing RAILWAY_TOKEN — add it to Settings → Environments → prod → Secrets"
            exit 1
          fi
          bash ../scripts/sync-railway-env.sh

      - name: Deploy backend to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: bash ../scripts/sync-railway-env.sh --deploy

  deploy-frontend:
    name: Vercel
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync API keys to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GHL_API_TOKEN: ${{ secrets.GHL_API_TOKEN }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing VERCEL_TOKEN — add it to Settings → Environments → prod → Secrets"
            exit 1
          fi
          bash scripts/sync-vercel-env.sh

      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm ci
          npx --yes vercel@54.13.0 deploy --prod --yes --force --token="$VERCEL_TOKEN"
